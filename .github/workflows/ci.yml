name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./tooling/github/setup

      # - name: Copy env
      #   shell: bash
      #   run: cp .env.example .env

      - name: Lint
        run: pnpm lint && pnpm lint:ws

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # This automatically caches your node_modules for faster runs
          cache: 'pnpm' 

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Typecheck
        # This calls the "typecheck" script we added to your root package.json
        run: pnpm typecheck